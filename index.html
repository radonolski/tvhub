<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Startseite</title>
    <style>
        /* Dunkles, minimalistisches Design */
        :root {
            --bg-color: #000000;       /* Hintergrund der Website (Tiefschwarz) */
            --card-bg-default: #1c1c1e;/* Standard-Dunkelgrau, falls keine Farbe definiert ist */
            --text-color: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Raster für die Kacheln */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            max-width: 1200px;
            width: 100%;
        }

        /* Das Kachel-Design */
        .card {
            background-color: var(--card-bg-default);
            border-radius: 24px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            aspect-ratio: 16 / 9;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            cursor: pointer;
        }

        /* Hover-Effekt */
        .card:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
        }

        /* Typografie */
        .card h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .card p {
            margin: 8px 0 0 0;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <a href="https://streamed.pk/category/football" class="card" style="background-color: #6441a5;">
            <h2>Fußball</h2>
            <p>Fußball Ergebnisse & Streams</p>
        </a>

        <a href="https://bcine.ru/" class="card" style="background-color: #1f6f3e;">
            <h2>Filme und Serien (4K)</h2>
            <p>Einige Filme und Serien in 4K</p>
        </a>

        <a href="https://www.cineby.at/" class="card" style="background-color: #0b57d0;">
            <h2>Filme uns Serien (FHD)</h2>
            <p>Einige Filme und Serien in FHD</p>
        </a>

        <a href="https://fmhy.net/video" class="card">
            <h2>Streaming Anbieter</h2>
            <p>Verschiedene Streamingdienste</p>
        </a>

    </div>

</body>
</html>
